<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Canadian Healthcare Wait Times Dashboard Preview</title>
  <desc id="desc">Static dashboard preview showing p50, p90, and p95 wait times by healthcare service type.</desc>
  <rect width="1400" height="900" fill="#f8f4ec"/>
  <rect x="54" y="54" width="1292" height="792" rx="34" fill="#fffaf2" stroke="#ded6c8"/>
  <text x="96" y="122" fill="#9f3f22" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">PROJECT 1</text>
  <text x="96" y="174" fill="#172128" font-family="Arial, sans-serif" font-size="48" font-weight="800">Canadian Healthcare Wait Times by Service Type</text>
  <text x="96" y="214" fill="#5f6f73" font-family="Arial, sans-serif" font-size="22">Source: Statistics Canada public wait-time output, summarized with SQLite</text>

  <rect x="96" y="262" width="360" height="142" rx="24" fill="#ffffff" stroke="#ded6c8"/>
  <text x="126" y="310" fill="#5f6f73" font-family="Arial, sans-serif" font-size="20">Highest p95 wait</text>
  <text x="126" y="363" fill="#172128" font-family="Arial, sans-serif" font-size="50" font-weight="800">34.7 weeks</text>
  <text x="126" y="386" fill="#9f3f22" font-family="Arial, sans-serif" font-size="18">Non-emergency surgeries</text>

  <rect x="496" y="262" width="318" height="142" rx="24" fill="#ffffff" stroke="#ded6c8"/>
  <text x="526" y="310" fill="#5f6f73" font-family="Arial, sans-serif" font-size="20">Lowest median wait</text>
  <text x="526" y="363" fill="#172128" font-family="Arial, sans-serif" font-size="50" font-weight="800">3.0 weeks</text>
  <text x="526" y="386" fill="#9f3f22" font-family="Arial, sans-serif" font-size="18">Selected diagnostic tests</text>

  <rect x="854" y="262" width="318" height="142" rx="24" fill="#ffffff" stroke="#ded6c8"/>
  <text x="884" y="310" fill="#5f6f73" font-family="Arial, sans-serif" font-size="20">Service groups</text>
  <text x="884" y="363" fill="#172128" font-family="Arial, sans-serif" font-size="50" font-weight="800">3</text>
  <text x="884" y="386" fill="#9f3f22" font-family="Arial, sans-serif" font-size="18">Compared across percentiles</text>

  <text x="96" y="470" fill="#172128" font-family="Arial, sans-serif" font-size="30" font-weight="800">Wait-time percentile comparison</text>
  <text x="96" y="504" fill="#5f6f73" font-family="Arial, sans-serif" font-size="18">Weeks waited by service type; p95 exposes long-tail access pressure.</text>

  <g font-family="Arial, sans-serif" font-size="18" fill="#172128">
    <text x="96" y="574">Non-emergency surgeries</text>
    <rect x="340" y="550" width="89" height="22" rx="11" fill="#eab95b"/>
    <rect x="340" y="582" width="540" height="22" rx="11" fill="#c75b39"/>
    <rect x="340" y="614" width="720" height="22" rx="11" fill="#9f3f22"/>
    <text x="1080" y="631" font-weight="700">p95 34.7</text>

    <text x="96" y="684">Specialist visits</text>
    <rect x="340" y="660" width="89" height="22" rx="11" fill="#eab95b"/>
    <rect x="340" y="692" width="359" height="22" rx="11" fill="#c75b39"/>
    <rect x="340" y="724" width="540" height="22" rx="11" fill="#9f3f22"/>
    <text x="1080" y="741" font-weight="700">p95 26.0</text>

    <text x="96" y="794">Selected diagnostic tests</text>
    <rect x="340" y="770" width="62" height="22" rx="11" fill="#eab95b"/>
    <rect x="340" y="802" width="270" height="22" rx="11" fill="#c75b39"/>
    <rect x="340" y="834" width="540" height="22" rx="11" fill="#9f3f22"/>
    <text x="1080" y="851" font-weight="700">p95 26.0</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="17">
    <rect x="1112" y="466" width="22" height="22" rx="11" fill="#eab95b"/><text x="1144" y="484" fill="#5f6f73">p50</text>
    <rect x="1196" y="466" width="22" height="22" rx="11" fill="#c75b39"/><text x="1228" y="484" fill="#5f6f73">p90</text>
    <rect x="1280" y="466" width="22" height="22" rx="11" fill="#9f3f22"/><text x="1312" y="484" fill="#5f6f73">p95</text>
  </g>
</svg>
